<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HatcheryOS — CPF Malaysia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1a;--bg2:#111827;--bg3:#1a2235;--bg4:#1f2d42;--bg5:#243352;
  --bor:#1e2d45;--bor2:#2a3d5a;
  --t:#e8edf5;--t2:#8fa3be;--t3:#4d6380;
  --gr:#00d4aa;--gr2:#00b894;--gr3:rgba(0,212,170,.12);
  --am:#f0a500;--am2:rgba(240,165,0,.12);
  --bl:#3d8ef8;--bl2:rgba(61,142,248,.12);
  --re:#f05252;--re2:rgba(240,82,82,.12);
  --pu:#a78bfa;--pu2:rgba(167,139,250,.12);
  --cy:#06b6d4;--cy2:rgba(6,182,212,.12);
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r:10px;--r2:14px;--sh:0 4px 24px rgba(0,0,0,.4);
}
body{background:var(--bg);color:var(--t);font-family:var(--fb);font-size:13px;min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:var(--fb)}
button{cursor:pointer}

/* ── LAYOUT ── */
.shell{display:flex;min-height:100vh}
.sb{width:224px;background:var(--bg2);border-right:1px solid var(--bor);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
.main{margin-left:224px;flex:1;min-height:100vh}

/* ── SIDEBAR ── */
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid var(--bor)}
.sb-mark{width:32px;height:32px;background:var(--gr);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.sb-name{font-family:var(--fh);font-size:15px;font-weight:800;letter-spacing:-.3px}
.sb-sub{font-size:9px;color:var(--t3);font-family:var(--fm);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}
.nav{padding:10px 8px;flex:1}
.nav-group{margin-bottom:16px}
.nav-label{font-size:9px;color:var(--t3);font-family:var(--fm);text-transform:uppercase;letter-spacing:.7px;padding:0 8px;margin-bottom:4px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:12.5px;border:none;background:none;width:100%;text-align:left;position:relative;transition:all .15s}
.ni:hover{background:var(--bg3);color:var(--t)}
.ni.act{background:rgba(0,212,170,.1);color:var(--gr);font-weight:500}
.ni.act::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--gr);border-radius:0 3px 3px 0}
.ni-badge{margin-left:auto;background:var(--re);color:#fff;font-size:9px;font-family:var(--fm);padding:1px 5px;border-radius:10px;font-weight:500}
.sb-foot{padding:12px;border-top:1px solid var(--bor)}
.sb-stat{background:var(--bg3);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;font-size:10px;color:var(--t3);font-family:var(--fm);line-height:2}
.sb-stat b{color:var(--t2)}
.ubar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);background:var(--bg3)}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--fm);flex-shrink:0}

/* ── TOP BAR ── */
.topbar{height:54px;border-bottom:1px solid var(--bor);display:flex;align-items:center;padding:0 22px;gap:12px;background:var(--bg2);position:sticky;top:0;z-index:50}
.tbtitle{font-family:var(--fh);font-size:17px;font-weight:800;flex:1}
.tbsub{font-size:10px;color:var(--t3);font-family:var(--fm)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--fm)}
.cg{background:rgba(0,212,170,.12);color:var(--gr)}
.ca{background:rgba(240,165,0,.12);color:var(--am)}
.cb{background:rgba(61,142,248,.12);color:var(--bl)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block}

/* ── PAGE ── */
.pg{padding:22px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--bor);border-radius:var(--r2);padding:16px}
.ct{font-family:var(--fm);font-size:9px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.gr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}

/* ── KPI ── */
.kpi{padding:16px 18px}
.kv{font-family:var(--fh);font-size:26px;font-weight:800;line-height:1;margin:4px 0 2px}
.kl{font-size:9px;color:var(--t3);font-family:var(--fm);text-transform:uppercase;letter-spacing:.6px}
.ks{font-size:11px;color:var(--t3);margin-top:3px}
.kbar{height:2px;background:var(--bor);border-radius:2px;margin-top:10px;overflow:hidden}
.kbf{height:100%;border-radius:2px}
.kdelta{font-size:10px;font-family:var(--fm);margin-top:2px}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
th{font-size:9px;font-family:var(--fm);text-transform:uppercase;letter-spacing:.7px;color:var(--t3);padding:8px 10px;text-align:left;border-bottom:1px solid var(--bor);white-space:nowrap;background:var(--bg3)}
td{padding:8px 10px;border-bottom:1px solid var(--bor);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.mn{font-family:var(--fm);font-size:11px}
.ovx{overflow-x:auto}
.tr{text-align:right}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:500;font-family:var(--fm);white-space:nowrap}
.dg{background:rgba(0,212,170,.15);color:var(--gr)}
.da{background:rgba(240,165,0,.15);color:var(--am)}
.dr{background:rgba(240,82,82,.15);color:var(--re)}
.db{background:rgba(61,142,248,.15);color:var(--bl)}
.dp{background:rgba(167,139,250,.15);color:var(--pu)}
.dm{background:var(--bg4);color:var(--t3)}

/* ── ALERTS ── */
.al{padding:9px 12px;border-radius:8px;font-size:11.5px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.aw{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.25);color:#fde68a}
.agr{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.25);color:#6ee7b7}
.are{background:rgba(240,82,82,.08);border:1px solid rgba(240,82,82,.25);color:#fca5a5}
.abl{background:rgba(61,142,248,.08);border:1px solid rgba(61,142,248,.25);color:#93c5fd}

/* ── FORMS ── */
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:9px;font-family:var(--fm);color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.inp{background:var(--bg3);border:1px solid var(--bor);border-radius:8px;padding:8px 10px;color:var(--t);font-size:12.5px;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--gr)}
select.inp option{background:var(--bg3)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:500;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.bpri{background:var(--gr);color:#000;font-weight:600}
.bpri:hover{background:var(--gr2)}
.bsec{background:var(--bg3);color:var(--t2);border:1px solid var(--bor)}
.bsec:hover{background:var(--bg4);color:var(--t)}
.bsm{padding:4px 9px;font-size:11px}
.bxl{background:var(--bg3);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.bpdf{background:var(--bg3);color:var(--re);border:1px solid rgba(240,82,82,.3)}
.bdanger{background:var(--re);color:#fff}

/* ── TABS ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--bor);margin-bottom:16px}
.tab{padding:7px 14px;font-size:12px;cursor:pointer;color:var(--t3);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.act{color:var(--gr);border-bottom-color:var(--gr)}
.tab:hover:not(.act){color:var(--t2)}

/* ── MODAL ── */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(4px)}
.mo{background:var(--bg2);border:1px solid var(--bor2);border-radius:16px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto}
.moh{padding:14px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between}
.mot{font-family:var(--fh);font-size:14px;font-weight:800}
.mob{padding:18px}
.mof{padding:12px 18px;border-top:1px solid var(--bor);display:flex;justify-content:flex-end;gap:8px}

/* ── MISC ── */
.fl{display:flex}.aic{align-items:center}.jb{justify-content:space-between}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.w100{width:100%}
.box{background:var(--bg3);border:1px solid var(--bor);border-radius:9px;padding:11px 14px;font-size:11.5px;color:var(--t2);line-height:1.8}
.sep{height:1px;background:var(--bor);margin:12px 0}
.pbar{height:4px;background:var(--bor);border-radius:2px;overflow:hidden}
.pbf{height:100%;border-radius:2px;transition:width .4s}
.tg{color:var(--gr)}.ta{color:var(--am)}.tb{color:var(--bl)}.tr2{color:var(--re)}.tp{color:var(--pu)}
.cA{color:var(--gr)}.cB{color:var(--bl)}.cC{color:var(--am)}
.row-val{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.row-val:last-child{margin-bottom:0}

/* ── RING ── */
.ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.rinn{position:absolute;text-align:center}

/* ── TIMELINE ── */
.tline{display:flex}
.tls{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.tls:not(:last-child)::after{content:'';position:absolute;top:12px;left:50%;width:100%;height:2px;z-index:0}
.tld{width:24px;height:24px;border-radius:50%;border:2px solid var(--bor);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--fm);position:relative;z-index:1}
.tll{font-size:9px;font-family:var(--fm);margin-top:4px;text-align:center;max-width:52px;line-height:1.3;color:var(--t3)}
.tls.done .tld{border-color:var(--gr);background:rgba(0,212,170,.15);color:var(--gr)}
.tls.done::after{background:var(--gr)!important}
.tls.curr .tld{border-color:var(--am);background:rgba(240,165,0,.15);color:var(--am)}
.tls.fut::after{background:var(--bor)!important}
.tls.done .tll{color:var(--gr)}.tls.curr .tll{color:var(--am)}

/* ── DBAR ── */
.dbar{display:flex;gap:2px;height:22px;border-radius:6px;overflow:hidden}
.dseg{flex:1;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:var(--fm);color:rgba(0,0,0,.8);font-weight:600;border-radius:2px}

/* ── SUPPLY CHART ── */
.supply-bar{height:10px;border-radius:5px;overflow:hidden;background:var(--bor);margin:4px 0}
.supply-fill{height:100%;border-radius:5px;transition:width .4s}
.supply-grid{display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:center;margin-bottom:10px}

/* ── LOGIN ── */
.lw{position:fixed;inset:0;background:linear-gradient(135deg,#0a0f1a 0%,#0d1f35 100%);display:flex;align-items:center;justify-content:center;z-index:999}
.lb{width:420px;background:var(--bg2);border:1px solid var(--bor2);border-radius:18px;padding:34px 30px;box-shadow:var(--sh)}
.uc{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:9px;border:1.5px solid var(--bor);cursor:pointer;margin-bottom:8px;background:var(--bg3);transition:all .15s}
.uc:hover{border-color:var(--bor2);background:var(--bg4)}
.uc.sel{border-color:var(--gr);background:rgba(0,212,170,.08)}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--t3);font-family:var(--fm);font-size:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--bor);border-top-color:var(--gr);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px;flex-shrink:0}

/* ── PROGRESS CARD ── */
.prog-card{background:var(--bg3);border-radius:var(--r);padding:12px 14px;border:1px solid var(--bor)}
.prog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}

/* ── FARM SUPPLY ── */
.gap-positive{color:var(--gr)}.gap-negative{color:var(--re)}
.week-selector{display:flex;align-items:center;gap:8px}
.week-btn{background:var(--bg3);border:1px solid var(--bor);color:var(--t2);width:28px;height:28px;border-radius:7px;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.week-btn:hover{background:var(--bg4);color:var(--t)}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--bor);border-radius:10px;padding:11px 16px;font-size:12.5px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px;min-width:240px;animation:slideIn .2s ease}
.toast.success{border-color:rgba(0,212,170,.4)}.toast.error{border-color:rgba(240,82,82,.4)}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
'use strict';

/* ══════════════════════════════════════════
   SUPABASE CONFIG — same project as DOC Tracker
   ══════════════════════════════════════════ */
const SB_URL  = 'https://ncnppcmlxdaabuwkcbtm.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbnBwY21seGRhYWJ1d2tjYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNjg3NTEsImV4cCI6MjA5Mjc0NDc1MX0.bfUzVo4WvMdjAtZl9NdCf8Q7CScghg-oWTRFLlhHaTs';
let sb = null;

/* ══════════════════════════════════════════
   STATIC DATA
   ══════════════════════════════════════════ */
const FARMS    = ['Rantau','Sg. Sayong','Ulu Tiram','Kluang','Sg. Siput'];
const FARM_KEYS= ['farm_rantau','farm_sg_sayong','farm_ulu_tiram','farm_kluang','farm_sg_siput'];
const HATCH    = [
  {name:'Chengkau',  typ:'SS',wc:774144, note:'Max 2 machines/day'},
  {name:'Kluang',    typ:'SS',wc:345600, note:'Mon/Thu=1, Tue/Fri=2 machines'},
  {name:'K.Kangsar', typ:'MS',wc:622080, note:'18 machines × 4 days'},
  {name:'Sg. Sayong',typ:'MS',wc:311040, note:'12 machines × 4 days'},
];
const HN       = HATCH.map(h=>h.name);
const BREEDS   = ['Ross 308','Cobb 500','Hubbard'];
const BC       = ['cA','cB','cC'];
const bI       = b=>b==='Ross 308'?0:b==='Cobb 500'?1:2;
const TOTAL_CAP= HATCH.reduce((s,h)=>s+h.wc,0); // 2,052,864

/* Breed Standards: WOP → hatchability% */
const STD = {
  'Ross 308':{24:72,25:75,26:78,27:81,28:83,29:85,30:86,31:87,32:87,33:86,34:85,35:84,36:83,37:81,38:79,39:77,40:74,41:72,42:69,43:67,44:65,45:63,46:61,47:59,48:57,49:55,50:53},
  'Cobb 500':{24:70,25:73,26:76,27:79,28:82,29:84,30:85,31:86,32:86,33:85,34:84,35:82,36:80,37:78,38:76,39:74,40:71,41:68,42:65,43:63,44:61,45:59,46:57,47:55,48:53,49:51,50:49},
  'Hubbard':  {24:68,25:71,26:74,27:77,28:80,29:82,30:83,31:84,32:84,33:83,34:82,35:80,36:78,37:76,38:74,39:72,40:69,41:66,42:63,43:61,44:59,45:57,46:55,47:53,48:51,49:49,50:47},
};

/* ══════════════════════════════════════════
   UTILS
   ══════════════════════════════════════════ */
const gS=(b,w)=>{const t=STD[b]||STD['Ross 308'],k=Object.keys(t).map(Number).sort((a,z)=>a-z);if(w<=k[0])return t[k[0]];if(w>=k[k.length-1])return t[k[k.length-1]];return t[w]||t[k.reduce((p,x)=>Math.abs(x-w)<Math.abs(p-w)?x:p,k[0])];};
const dc=(d,w)=>{let r=0;for(let i=1;i<=d;i++)r+=(i<=7?.2:.5)+(w>38&&i>5?.1:0);return parseFloat(r.toFixed(2));};
const aH=(b,w,d)=>Math.max(parseFloat((gS(b,w)-dc(d,w)).toFixed(1)),0);
const td=()=>new Date().toISOString().split('T')[0];
const aD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split('T')[0];};
const dD=(a,b)=>Math.floor((new Date(b)-new Date(a))/86400000);
const sb2=n=>aD(td(),-n);
const fD=d=>new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const fS=d=>new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
const fN=n=>typeof n==='number'?n.toLocaleString():n||'—';
const cC=p=>p>1?'#f05252':p>=.85?'#00d4aa':p>=.6?'#f0a500':'#f05252';
const cL=p=>p>1?'Over Cap':p>=.85?'Optimal':p>=.6?'Good':'Low';
const isoWeek=d=>{const dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const wk1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt-wk1)/86400000-3+(wk1.getDay()+6)%7)/7);};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ══════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════ */
function toast(msg,type='success'){
  const w=document.getElementById('toastWrap');
  const d=document.createElement('div');
  const ic=type==='success'?'✓':type==='error'?'✕':'ℹ';
  const col=type==='success'?'var(--gr)':type==='error'?'var(--re)':'var(--bl)';
  d.className=`toast ${type}`;
  d.innerHTML=`<span style="color:${col};font-weight:700;font-family:var(--fm)">${ic}</span>${esc(msg)}`;
  w.appendChild(d);
  setTimeout(()=>d.remove(),3500);
}

/* ══════════════════════════════════════════
   STATE
   ══════════════════════════════════════════ */
let state = {
  user: null,
  page: 'db',
  loading: false,
  lots: [],
  settings: [],
  farmPlans: [],
  alerts: [],
};

function setState(patch){
  Object.assign(state, patch);
  render();
  if(state.page==='res') setTimeout(updateCalc, 50);
}

/* ══════════════════════════════════════════
   SUPABASE DATA LAYER
   ══════════════════════════════════════════ */
async function initSupabase(){
  sb = supabase.createClient(SB_URL, SB_KEY);
  const {data:{session}} = await sb.auth.getSession();
  if(session) await afterLogin(session.user);
  else showLogin();
}

async function afterLogin(user){
  setState({user, loading:true});
  await loadAll();
  setState({loading:false});
  // realtime subscriptions
  sb.channel('hatchery-os')
    .on('postgres_changes',{event:'*',schema:'public',table:'egg_lots'},()=>loadLots())
    .on('postgres_changes',{event:'*',schema:'public',table:'egg_settings'},()=>loadSettings())
    .on('postgres_changes',{event:'*',schema:'public',table:'farm_egg_plan'},()=>loadFarmPlans())
    .subscribe();
}

async function loadAll(){
  await Promise.all([loadLots(), loadSettings(), loadFarmPlans()]);
}

async function loadLots(){
  try{
    const {data,error}=await sb.from('egg_lots').select('*').order('recv_date',{ascending:false});

/* ══════════════════════════════════════════
   COMPUTED HELPERS
   ══════════════════════════════════════════ */
function computeAlerts(){
  const alerts=[];
  const activeLots=state.lots.filter(l=>l.status==='cool_room');
  activeLots.forEach(l=>{
    const age=Math.max(dD(l.recv_date,td()),0);
    if(age>=10) alerts.push({t:'r',m:`${l.lot_id} (${l.hatchery}): ${age}d — CRITICAL storage`});
    else if(age>=7) alerts.push({t:'a',m:`${l.lot_id} (${l.hatchery}): ${age}d — accelerating decay`});
    else if(l.wop>38&&age>=5) alerts.push({t:'a',m:`${l.lot_id} WOP ${l.wop} old flock + ${age}d`});
  });
  const activeSettings=state.settings.filter(s=>s.status!=='completed');
  activeSettings.forEach(s=>{
    const d=dD(td(),s.hatch_date);
    if(d>=0&&d<=2) alerts.push({t:'g',m:`${s.set_id}: hatching ${d===0?'today':`in ${d}d`} at ${s.hatchery}`});
  });
  return alerts;
}

/* ══════════════════════════════════════════

function renderSched(){
  const active=state.settings.filter(s=>s.status!=='completed');

  return `
  <div>
    ${active.length===0?`<div class="al abl mb16">${ic('info',12)} No active settings. Initiate from Cool Room.</div>`:''}
    ${active.map(s=>{
      const day=Math.min(Math.max(dD(s.set_date,td()),0),21);
      const ad=s.adj_hatchability||aH(s.breed,s.wop,s.storage_days);
      return `<div class="card mb12">
        <div class="fl aic jb mb12">
          <div class="fl aic" style="gap:10px">
            <span class="mn tg">${esc(s.set_id)}</span>
            <span style="font-size:12px">${esc(s.hatchery)}</span>
            <span class="${BC[bI(s.breed)]}">${esc(s.breed)}</span>
            <span class="mn" style="color:var(--t3)">WOP ${s.wop}</span>
            ${ageBadge(s.storage_days,s.wop)}
          </div>
          <div class="fl aic" style="gap:8px">
            ${statusBadge(s.status)}
            ${s.status==='incubating'&&day>=17?`<button class="btn bsec bsm" onclick="advanceSetting('${s.id}','candling')">Candle</button>`:''}
            ${s.status==='candling'?`<button class="btn bsec bsm" onclick="advanceSetting('${s.id}','transfer')">Transfer</button>`:''}

        </div>
        <div class="tline mb12">${steps.map((st,i)=>{
          const dn=day>=st.d&&i<steps.length-1;
          const ac=!dn&&Math.abs(day-st.d)<=1;
          return `<div class="tls ${dn?'done':ac?'curr':'fut'}">
            <div class="tld">${dn?'✓':st.d}</div>
            <div class="tll">${st.l}</div>
          </div>`;}).join('')}
        </div>
        <div class="gr4">
          ${[
            {l:'Set Date',v:fS(s.set_date)},
            {l:'Hatch Date',v:fS(s.hatch_date),c:'var(--am)'},
            {l:'Adj Hatch%',v:ad+'%',c:ad>=gS(s.breed,s.wop)?'var(--gr)':'var(--am)'},
            {l:'Forecast DOC',v:fN(s.forecast_doc||Math.round((s.set_qty||0)*ad/100)),c:'var(--gr)'},
          ].map(k=>`<div>
            <div class="mn" style="font-size:8px;color:var(--t3);text-transform:uppercase;margin-bottom:3px">${k.l}</div>

            <span style="font-size:10px;color:var(--t3)">Day ${day}/21</span>
            <span style="font-size:10px;color:var(--t3)">${Math.round(day/21*100)}%</span>
          </div>
          <div class="pbar"><div class="pbf" style="width:${day/21*100}%;background:var(--am)"></div></div>
        </div>
      </div>`;}).join('')}

    <div class="card mt16">
      <div class="ct">Hatch Calendar</div>
      <div class="ovx"><table>
        <thead><tr><th>Hatch Date</th><th>Set ID</th><th>Hatchery</th><th>Breed</th><th>WOP</th><th>Storage</th><th>Set Qty</th><th>Adj%</th><th>Forecast DOC</th><th>Status</th></tr></thead>

          return `<tr>
            <td class="mn ta">${fS(s.hatch_date)}</td>
            <td class="mn tg">${esc(s.set_id)}</td>
            <td style="font-size:11px">${esc(s.hatchery)}</td>
            <td><span class="${BC[bI(s.breed)]}">${esc(s.breed)}</span></td>
            <td class="mn">${s.wop}w</td>
            <td>${ageBadge(s.storage_days,s.wop)}</td>
            <td class="mn tr">${fN(s.set_qty)}</td>
            <td class="mn" style="color:${ad>=gS(s.breed,s.wop)?'var(--gr)':'var(--am)'}">${ad}%</td>

/* ══════════════════════════════════════════
   PAGE: DOC FORECAST
   ══════════════════════════════════════════ */
function renderForecast(){
  // Group active settings by hatch week
  const byWk={};
  state.settings.filter(s=>s.status!=='completed').forEach(s=>{
    const wk=s.hatch_week_no||isoWeek(s.hatch_date);
    if(!byWk[wk]) byWk[wk]={wk,date:s.hatch_date,hatcheries:{}};
    if(!byWk[wk].hatcheries[s.hatchery]) byWk[wk].hatcheries[s.hatchery]=0;
    byWk[wk].hatcheries[s.hatchery]+=(s.forecast_doc||0);
  });
  const weeks=Object.values(byWk).sort((a,b)=>a.wk-b.wk).slice(0,8);

  return `
  <div>
    <div class="al agr mb16">${ic('info',12)} DOC Forecast shows expected hatchlings from current active settings. These values auto-sync to DOC Tracker's Hatchery Estimates.</div>
    ${weeks.length?`
      <div class="card mb16">
        <div class="ct">8-Week DOC Forecast by Hatchery</div>
        <div class="ovx"><table>
          <thead><tr><th>Wk</th><th>Hatch Week</th>${HN.map(h=>`<th>${h}</th>`).join('')}<th>Total DOC</th><th>vs Capacity</th></tr></thead>
          <tbody>${weeks.map(w=>{
            const totDoc=Object.values(w.hatcheries).reduce((s,v)=>s+v,0);
            const ratio=TOTAL_CAP>0?totDoc/TOTAL_CAP:0;
            return `<tr>
              <td class="mn"><b>W${w.wk}</b></td>
              <td class="mn ta">${fS(w.date)}</td>
              ${HN.map(h=>`<td class="mn tr">${fN(w.hatcheries[h]||0)||'—'}</td>`).join('')}
              <td class="mn tr" style="font-weight:600;color:var(--gr)">${fN(totDoc)}</td>
              <td class="mn" style="color:${cC(ratio)}">${Math.round(ratio*100)}% ${cL(ratio)}</td>
            </tr>`;}).join('')}
          </tbody>
        </table></div>
      </div>

      <div class="card">
        <div class="ct">Forecast Visual</div>
        ${weeks.map(w=>{
          const total=Object.values(w.hatcheries).reduce((s,v)=>s+v,0);
          const pct=Math.min(total/TOTAL_CAP*100,100);
          return `<div style="margin-bottom:12px">
            <div class="fl aic jb" style="margin-bottom:4px">
              <span style="font-size:12px">W${w.wk} — ${fS(w.date)}</span>
              <span class="mn tg">${fN(total)} DOC</span>
            </div>
            <div class="pbar" style="height:8px"><div class="pbf" style="width:${pct}%;background:${cC(total/TOTAL_CAP)}"></div></div>
          </div>`;}).join('')}
      </div>
    `:`<div class="card" style="text-align:center;padding:48px;color:var(--t3)">
        ${ic('trend',32,'var(--t3)')}
        <div style="margin-top:12px">No active settings to forecast</div>
        <div style="font-size:11px;margin-top:4px">Initiate settings from Cool Room to see forecast</div>
      </div>`}
  </div>`;
}

      </div>`).join('')}

        <div style="font-family:var(--fh);font-weight:600;font-size:11px;margin-bottom:6px">Research Sources</div>
        <div style="font-size:10px;color:var(--t3);line-height:2">
          PMC12414264 (2025) — Ross 308: -0.2%/day (d1–7), -0.5%/day (d7+)<br>
          PMC7597949 (Lourens et al. 2020) — Breeder age × storage on embryo mortality<br>
          Alsobayel et al. (2012) — Cobb, Ross 308, Arbor Acres at 0, 7, 14 days storage<br>
          Oke et al. (2024) Translational Animal Science txae070
        </div>
      </div>
    </div>
    <div class="card">
      <div class="ct">Interactive Decay Calculator</div>
      <div class="fr2 mb16">
        <div class="fld"><label>Breed</label>
          <select class="inp" id="calcBreed" onchange="updateCalc()">${BREEDS.map(b=>`<option>${b}</option>`).join('')}</select>
        </div>
        <div class="fld"><label>WOP</label>
          <input class="inp" type="number" id="calcWop" value="30" min="24" max="65" oninput="updateCalc()"/>
        </div>
      </div>
      <div id="calcTable"></div>
    </div>
  </div>`;
}

function updateCalc(){
  const breed=document.getElementById('calcBreed')?.value||'Ross 308';
  const wop=parseInt(document.getElementById('calcWop')?.value||30);
  const std=gS(breed,wop);
  const rows=Array.from({length:14},(_,i)=>i+1).map(d=>{
    const dec=dc(d,wop);
    const ad=aH(breed,wop,d);
    const loss=Math.round(10000*(std-ad)/100);
    const rec=d<=5?'Optimal':d<=7?'Acceptable':d<=10?'Caution':'Critical';
    const rc={Optimal:'var(--gr)',Acceptable:'var(--gr)',Caution:'var(--am)',Critical:'var(--re)'}[rec];
    return `<tr>
      <td class="mn">Day ${d}</td>
      <td class="mn" style="color:var(--t3)">${d<=7?'-0.2%/d':'-0.5%/d'}</td>
      <td class="mn" style="color:${dec>3?'var(--re)':dec>1?'var(--am)':'var(--gr)'}">-${dec}%</td>
      <td class="mn" style="color:${ad>=(std-1)?'var(--gr)':ad>=(std-3)?'var(--am)':'var(--re)'}">${ad}%</td>
      <td class="mn" style="color:${loss>300?'var(--re)':loss>100?'var(--am)':'var(--gr)'}">-${fN(loss)}</td>
      <td><span class="bdg" style="background:${rc}22;color:${rc}">${rec}</span></td>
    </tr>`;});
  const el=document.getElementById('calcTable');
  if(el) el.innerHTML=`<table>
    <thead><tr><th>Day</th><th>Rate</th><th>Cumulative Decay</th><th>Adj Hatch%</th><th>DOC loss/10,000</th><th>Status</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

async function confirmSetting(lotId){
  const lot=state.lots.find(l=>l.id===lotId);
  if(!lot) return;
  const qty=parseInt(document.getElementById('set_qty').value)||0;
  if(!qty){toast('Enter setting quantity','error');return;}
  if(qty>lot.stock_remaining){toast('Exceeds stock','error');return;}
  const setDate=document.getElementById('set_date').value;
  const age=Math.max(dD(lot.recv_date,setDate),0);
  const std=gS(lot.breed,lot.wop);
  const adj=aH(lot.breed,lot.wop,age);
  const dec=dc(age,lot.wop);
  const fDoc=Math.round(qty*adj/100);
  const hDate=aD(setDate,21);
  const hWk=isoWeek(hDate);

  const setData={
    set_id:document.getElementById('set_id').value,
    lot_id:lot.id,hatchery:lot.hatchery,breed:lot.breed,wop:lot.wop,
    storage_days:age,set_qty:qty,set_date:setDate,
    hatch_week_no:hWk,std_hatchability:std,storage_decay:dec,
    adj_hatchability:adj,forecast_doc:fDoc,status:'incubating',
    created_by:state.user.id,
  };
  const {error:se}=await sb.from('egg_settings').insert(setData);
  if(se){toast(se.message,'error');return;}

  // Reduce stock_remaining on lot
  const newStock=lot.stock_remaining-qty;
  const {error:le}=await sb.from('egg_lots').update({
    stock_remaining:newStock,
    status:newStock===0?'incubating':'cool_room',
  }).eq('id',lot.id);
  if(le) console.warn('lot update error',le);

  toast(`Setting confirmed — Hatch ${fS(hDate)}, Forecast ${fN(fDoc)} DOC`);
  closeModal();
  await Promise.all([loadLots(),loadSettings()]);
  setState({page:'sched'});
}

    <div class="mof">
      <button class="btn bsec" onclick="closeModal()">Cancel</button>
      <button class="btn bpri" onclick="completeHatch('${settingId}')">Complete</button>
    </div>`);
}

async function completeHatch(id){
  const doc=parseInt(document.getElementById('h_doc').value)||0;
  const pct=parseFloat(document.getElementById('h_pct').value)||0;
  const {error}=await sb.from('egg_settings').update({actual_doc:doc,actual_hatch_pct:pct,status:'completed'}).eq('id',id);
  if(error){toast(error.message,'error');return;}
  toast(`Hatch completed — ${fN(doc)} DOC produced`);closeModal();await loadSettings();
}

window.addEventListener('DOMContentLoaded', async()=>{
  await initSupabase();
});


</script>
